listener {
    timeout = 300                                 # 5min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 330                                                     # 5.5min
    on-timeout = /home/joshua/.bin/hypr-dpms.sh off                   # screen off when timeout has passed
    on-resume = /home/joshua/.bin/hypr-dpms.sh on && brightnessctl -r # screen on when activity is detected after timeout has fired.
}
