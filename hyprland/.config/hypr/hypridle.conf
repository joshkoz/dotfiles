general {
    lock_cmd = /home/joshua/.bin/hyprlock-wrapper.sh # avoid starting multiple hyprlock instances.
    unlock_cmd = loginctl unlock-session             # notify logind when unlocking
    before_sleep_cmd = loginctl lock-session         # lock before suspend.
    after_sleep_cmd = /home/joshua/.bin/hypr-dpms.sh on       # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 150                                # 2.5min.
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

